services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: backend
    restart: unless-stopped
    environment:
      - PORT=5000
      - DB_PATH=/data/mini_shop.db
    volumes:
      - backend_data:/data
    networks:
      - net_backend

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: gateway
    restart: unless-stopped
    environment:
      - PORT=5000
      - BACKEND_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - net_frontend
      - net_backend

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: frontend
    restart: unless-stopped
    environment:
      - PORT=5000
      - GATEWAY_URL=http://gateway:5000
    depends_on:
      - gateway
    ports:
      - "8080:5000"
    networks:
      - net_frontend

networks:
  net_frontend:
    driver: bridge
  net_backend:
    driver: bridge

volumes:
  backend_data:
